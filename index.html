<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny Knapp | Real Estate Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Montserrat:wght@200;300;400;600&family=Allison&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-main: #1a1a1a;
            --text-muted: #8a837e;
            --bg-champagne: #f7f3f0;
            --card-white: #ffffff;
            --accent-charcoal: #222222;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 80px 20px; 
            background-color: var(--bg-champagne); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        .bio-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        /* --- LEFT COLUMN: CONTENT --- */
        .title-group { margin-bottom: 40px; }

        .subtitle {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 12px;
        }

        .title {
            font-family: 'Tenor Sans', sans-serif;
            font-size: clamp(2.8rem, 8vw, 4rem);
            font-weight: 400;
            margin: 0;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .bio-text p { 
            font-weight: 300;
            line-height: 2.1; 
            margin-bottom: 30px; 
            font-size: 0.95rem; 
            color: var(--text-main);
            max-width: 580px;
        }

        .signature {
            font-family: 'Allison', cursive;
            font-size: 7rem;
            margin-top: -40px;
            margin-left: 5%;
            color: var(--accent-charcoal);
            opacity: 0;
            animation: fadeIn 2s ease forwards 1s;
        }

        /* Lifestyle Section */
        .local-picks {
            margin-top: 80px;
            border-top: 1px solid #e0dbd7;
            padding-top: 50px;
            max-width: 580px;
        }

        .picks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .pick-item span {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .pick-item p {
            font-size: 0.9rem;
            margin: 5px 0;
            font-weight: 400;
        }

        .pick-item small {
            font-size: 0.75rem;
            color: #aaa;
            font-weight: 300;
        }
